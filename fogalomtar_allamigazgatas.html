 általános jogorvoslati fórumként a fellebbezés elbírálására jogosult); a helyi önkormányzatok (és nemzetiségi önkormányzatok) törvényességi felügyelete; valamint informatikai, képzési, ügyfélszolgálati és nyilvántartási feladatok.","hv":"2.5.2.3 (2814-2917. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/24","pont":10,"q":"Határozza meg, hogy milyen elvárások fogalmazódnak meg a közigazgatással szemben a demokratikus jogállamban!","ks":["demokratikus jogállam","elvárások","többségi elv","fékek és ellensúlyok","kisebbségi érdek","értékek pluralizmusa","nyitott közigazgatás","átláthatóság","állampolgári részvétel","jó kormányzás"],"mv":"A demokratikus jogállamban a közigazgatással szemben – szemben a hatékony belső igazgatási működéssel – más elvárások fogalmazódnak meg. Érvényre kell jutnia a többségi elvnek úgy, hogy az egységes központi akaratérvényesítéssel szemben a fékek és ellensúlyok rendszere érvényesül, biztosítva, hogy egyetlen társadalmi csoport se kerüljön túlsúlyba és a kisebbségi érdek is védelmet kapjon. Érvényesül az értékek pluralizmusa, konfliktus esetén értéksemleges bürokratikus eljárás vehető igénybe. Nélkülözhetetlen a nyitott közigazgatás és a demokratikus (jó) kormányzás: átláthatóság, elszámoltathatóság, becsületesség, méltányosság, eredményesség, hatékonyság és a jogállamiság tisztelete, valamint az információhoz való hozzáférés és a döntéshozatalban való társadalmi részvétel.","hv":"3.2.1 (3378-3401. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/25","pont":10,"q":"Hasonlítsa össze a közintézeti és a közüzemi típusú szerveket! Határozza meg az azonosságokat és a különbségeket!","ks":["közintézet","közüzem","intézeti típusú szerv","humán közszolgáltatás","gazdasági közszolgáltatás","ingyenes vagy nem piaci ár","piaci ár","költségvetési szerv","gazdasági társaság","közalkalmazott","munkaviszony"],"mv":"A közintézet és a közüzem egyaránt intézeti típusú szerv (közszolgáltatás ellátására létrehozott szervtípus); ez az azonosságuk. A megkülönböztetés alapja az ellátott közszolgáltatás jellege. A közintézet humán közszolgáltatásokat biztosít (pl. oktatás, egészségügy, kultúra), amelyek fő szabályként ingyenesen vagy nem piaci áron vehetők igénybe; jogilag jellemzően költségvetési szerv, dolgozói közalkalmazottak. A közüzem (közvállalat) gazdasági közszolgáltatásokat nyújt (pl. közművek, tömegközlekedés), amelyek sokszor piaci áron vehetők igénybe, és az ellenérték pontosan mérhető; jellemzően gazdasági társasági formában működik, személyi állományát munkaviszony keretében alkalmazza. Eltér az irányítási/tulajdonosi viszony is: a költségvetési szervet (közintézetet) irányítják, a gazdasági társaságot a Ptk. szerinti tulajdonosi joggyakorlás jellemzi. Az elhatárolás viszonylagos.","hv":"3.2.4 (3756-3767, 3893-3897. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/26","pont":10,"q":"Ismertesse, hogy milyen törekvések voltak az államigazgatási feladatok felmérésére és milyen eredményt hoztak ezek!","ks":["államigazgatási feladatok felmérése","magyary zoltán","a magyar közigazgatás tükre","feladatkataszter","szervezetkataszter","államreform bizottság","állami feladatkataszter","közfeladat-kataszter","9850 feladat"],"mv":"Az államigazgatási feladatok felmérésére több törekvés volt. Az elsőt a tudomány tette: Magyary Zoltán 1932-ben „A magyar közigazgatás tükre” című munkájában 9850 közigazgatási feladatot határozott meg az ellátó szervekkel és a jogi szabályozással együtt. Ezután évtizedekig nem volt teljes körű feladat- (feladatkataszter) vagy szervezetkataszter. 2006-ban az Államreform Bizottság készített egy mintegy 4000 feladatot tartalmazó, nem teljes körű felmérést. 2010-ben a Kormány a közfeladatok teljes körű felmérését határozta el; ennek eredményeként 2012-ben (a Nemzeti Közszolgálati Egyetem bevonásával) elkészült az Állami feladatkataszter, amely közel 8000 jogszabály által meghatározott mintegy 30 000 feladatot tartalmaz, és információt szolgáltat a kormányzati döntésekhez, a jogalkotáshoz és a deregulációhoz.","hv":"3.1.2 (3244-3282. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/27","pont":10,"q":"Ismertesse, hogy mit jelent a POSDCORB betűszó és mi a jelentősége?","ks":["posdcorb","gulick","urwick","tervezés","szervezés","személyzeti ügyek","irányítás","összehangolás","ellenőrzés","költségvetés","igazgatás funkciói","mozaikszó"],"mv":"A POSDCORB egy mozaikszó, amely az igazgatás (közigazgatás) funkcióit foglalja össze; Gulick és Urwick (USA) alkotta meg a XX. század harmincas éveiben, a tudományos munkaszervezés irányzatának keretében, Fayol igazgatási elemeit kiegészítve. Az angol szavak kezdőbetűiből áll: planning (tervezés), organizing (szervezés), staffing (személyzeti ügyek intézése), directing (irányítás), coordinating (összehangolás), reporting (ellenőrzés/beszámolás), budgeting (pénzügyek, költségvetés). Jelentősége, hogy tömören összefoglalja, milyen elemekből áll az igazgatási tevékenység.","hv":"3.1.1 (3100-3106. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/28","pont":10,"q":"Ismertesse a hatékony igazgatás modelljét és ennek kritikáját!","ks":["hatékony igazgatás modellje","weber","bürokratikus szervezet","szigorú hierarchia","egyirányú információáramlás","zárt működés","uniformizáltság","kritika","demokratikus jogállam","nem átlátható"],"mv":"A hatékony igazgatás modelljét az igazgatástudomány dolgozta ki, nagymértékben Max Weber bürokratikus szervezetmodelljére alapozva. Jellemzői: a vezető(ség) akarata érvényesül, nem tűr ellentmondást; szigorú hierarchia (a felettes utasít, az alárendelt végrehajt); az alkalmazottak magukévá teszik a szervezet értékeit, de nem formálhatják azokat; szűrt, ellenőrzött, egyirányú információáramlás; zárt, átláthatatlan működés (a belső szabályokat csak a dolgozók ismerik); nagyfokú uniformizáltság. Kritikája, hogy bár szervezeten belül hatékony, a társadalom felé – a közigazgatás külső kapcsolatrendszerét illetően – ezek a jellemzők (zártság, átláthatatlanság, egyirányúság) egy demokratikus jogállamban elfogadhatatlanok.","hv":"3.2.1 (3358-3377. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/29","pont":10,"q":"Határozza meg az államigazgatási hatósági jogalkalmazás fogalmát és jellemzőit!","ks":["hatósági jogalkalmazás","hatóság","közhatalom","impérium","egyoldalú akaratnyilatkozat","mellérendeltség","jogszabályi felhatalmazás","ákr","jog vagy kötelezettség","szervezetrendszeren kívüli"],"mv":"Az államigazgatási hatósági jogalkalmazás az államigazgatási jogalkalmazás azon fajtája, ahol az erre feljogosított szerv hatóság. A hatóság az a szervtípus, amely államigazgatási hatósági jogkört gyakorol: a jogi normák előírásait a közigazgatási hierarchián kívül álló jogalanyokkal szemben, közhatalom (impérium) birtokában érvényesíti. A hatóság jogszabályi felhatalmazás alapján, a vele mellérendeltségi viszonyban álló jogalanyok számára egyoldalú akaratnyilatkozatával kötelezettséget, tiltást, korlátozást írhat elő, vagy jogosultságot állapíthat meg – a másik fél beleegyezése nélkül. Az eljárás rendjét az Ákr. szabályozza. Államigazgatási szervet hatósági jogkörrel kizárólag jogszabály ruházhat fel, és nem minden államigazgatási szerv rendelkezik vele; ugyanakkor nem államigazgatási szervet (pl. helyi önkormányzat szervét) is felruházhat vele jogszabály.","hv":"3.2.3.2 (3588-3608. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/30","pont":10,"q":"Határozza meg a hatósági felügyelet fogalmát és jellemzőit!","ks":["hatósági felügyelet","önkéntes jogkövetés","ellenőrzés","intézkedés","szankcionálás","ex lege","speciális hatósági felügyelet","általános hatósági felügyelet","nem hierarchikus","bírói jogorvoslat"],"mv":"A hatósági felügyelet a hatósági tevékenység egyik fő formája (a hatósági jogalkalmazás mellett); nem keverendő össze a szervezetrendszeri felügyelettel. Lényege: amikor a jogalanyok állami beavatkozás nélkül, önkéntes jogkövetéssel gyakorolják jogaikat vagy teljesítik kötelezettségeiket, a hatóság feladata a jogkövető magatartás ellenőrzése és – eltérés esetén – intézkedés, szükség esetén szankcionálás. Azért hatósági, mert az ellenőrzött jogalany a közigazgatás szervezetrendszerén kívül áll, nem hierarchikus alárendelt. Két fajtája: a speciális hatósági felügyelet (ex lege szabályozási mód esetén közvetlenül a jogszabályi előírások betartását ellenőrzi, pl. fogyasztóvédelmi hatóság), és az általános hatósági felügyelet (a jogalkalmazói aktusokban – pl. építési engedélyben – foglaltak betartásának ellenőrzése). Az intézkedések ellen bírói úton van jogorvoslat.","hv":"3.2.3.2 (3647-3704. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/31","pont":10,"q":"Határozza meg, hogy miben különbözik a kiadmányozás a hatáskörtől!","ks":["kiadmányozás","hatáskör","érdemi döntés kiadásának joga","átruházható belső szabályzatban","nem hatáskör-átruházás","vezető felelőssége megmarad","szignálás","jogszabály telepíti a hatáskört","ügyet magához vonhatja"],"mv":"A kiadmányozási jog az adott ügyben hatáskört gyakorló személy (az államigazgatásban főszabályként a szerv vezetője) érdemi döntése vagy intézkedése kiadásának, valamint az ügyirat irattárba helyezésének joga. A kiadmányozás több tekintetben különbözik a hatáskörtől. A hatáskört kizárólag jogszabály állapíthatja meg (telepíti), átruházni csak kifejezett jogszabályi engedéllyel lehet, és tilos a szubdelegálás, valamint a hatáskör elvonása. Ezzel szemben a kiadmányozási jog a szerven belül belső szabályzattal (pl. SZMSZ vagy kiadmányozási szabályzat) átruházható egy alsóbb szintű vezetőre, és ez nem minősül a hatáskör átruházásának: nem érinti a vezető hatáskörét és felelősségét, az ügyet magához vonhatja és egyedi utasítást adhat. A kiadmányozónak fel kell tüntetnie, hogy a hatáskör jogosultja nevében, megbízásából jár el.","hv":"3.2.5.2 (4148-4165. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/32","pont":10,"q":"Ismertesse az objektív felelősség fogalmát és jellemzőit az államigazgatási dolgozók vonatkozásában! Példákat is mutasson be!","ks":["objektív felelősség","vétkességre tekintet nélkül","jogsértés megalapozza","vis maior","leltárfelelősség","megőrzési felelősség","kárfelelősség","nincs kimentés általános szabály szerint"],"mv":"Az objektív felelősség a kárfelelősség körében jelenik meg az államigazgatási dolgozóknál. Lényege, hogy a felelősséget a jogsértés önmagában megalapozza, vagyis a jogsértő vétkességre (szándékosság, gondatlanság) tekintet nélkül felel. Az általános szabályok szerinti kimentés (annak bizonyítása, hogy úgy járt el, ahogy az adott helyzetben általában elvárható) itt nem elegendő; a kimentési ok a vis maior (elháríthatatlan külső erőhatalom). Példa az objektív felelősségre a visszaszolgáltatási vagy elszámolási kötelezettséggel átvett, állandóan őrizetben tartott, kizárólagosan használt vagy kezelt dolgokban (pl. munkaeszközök) bekövetkezett hiány, valamint a leltárfelelősség.","hv":"4.3.2 (4754-4766. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/33","pont":10,"q":"Határozza meg az államigazgatási dolgozó fegyelmi és kártérítési felelőssége közötti különbségeket!","ks":["fegyelmi felelősség","kártérítési felelősség","kötelezettségszegés","kár bekövetkezése","ok-okozati összefüggés","eredményfelelősség","vétkesség","fegyelmi büntetés","kártérítés"],"mv":"A fegyelmi és a kártérítési felelősség között a legfőbb különbség, hogy a kárfelelősség egy tényállási elemmel bővebb. A fegyelmi felelősség akkor áll be, ha az államigazgatási dolgozó a jogviszonyából eredő kötelezettségét vétkesen (szándékosan vagy gondatlanul) megszegi – itt elegendő a kötelezettségszegés. A kárfelelősség eredményfelelősség: akkor áll be, ha a tisztviselő a kötelezettsége vétkes megszegésével kárt is okoz, és bizonyítható az ok-okozati összefüggés a jogellenes magatartás és a kár között. A fegyelmi felelősség szankciója a fegyelmi büntetés (pl. megrovás, illetménycsökkentés, hivatalvesztés), a kárfelelősségé a kártérítés (amelynek mértéke a vétkesség alakzatától függ). Mindkettőt fegyelmi eljárás szabályai szerint állapítják meg.","hv":"4.3.1-4.3.2 (4694-4748. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/34","pont":10,"q":"Jellemezze az államigazgatási dolgozók büntetőjogi felelősségét és röviden mutassa be az egyes csoportjait!","ks":["büntetőjogi felelősség","bűncselekmény","hivatalos személy","közfeladatot ellátó személy","hivatali bűncselekmény","súlyosabb büntetés","hivatali visszaélés","vesztegetés"],"mv":"Az államigazgatási dolgozók büntetőjogi felelősségét a büntető törvénykönyvbe ütköző magatartás (bűncselekmény) elkövetése alapozza meg. A Btk. nem használja az államigazgatási dolgozó kifejezést, hanem a hivatalos személy (illetve a közfeladatot ellátó személy) tágabb fogalmába helyezi őket. Az egyes csoportok: vannak bűncselekmények, amelyeknél nincs jelentősége, hogy államigazgatási dolgozó követte-e el; vannak hivatali bűncselekmények, amelyeket kizárólag hivatalos vagy közfeladatot ellátó személyek követhetnek el (pl. hivatali vesztegetés elfogadása, bántalmazás hivatalos eljárásban, hivatali visszaélés); végül vannak bűncselekmények, amelyeket bárki elkövethet, de ha az elkövető hivatalos személy, szigorúbb (súlyosabb) elbírálás alá esik (pl. közokirat-hamisítás, zsarolás, pénzmosás).","hv":"4.3.3 (4789-4804. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/35","pont":10,"q":"Határozza meg az – általában vett - jogi felelősség fogalmát, mutassa be rendszerét, típusait és jellemzőit!","ks":["jogi felelősség","szankció","jogellenes magatartás","felróhatóság","vétkesség","objektív feltétel","szubjektív feltétel","szándékosság","gondatlanság"],"mv":"A jogi felelősség legáltalánosabban szankció kilátásba helyezését jelenti akkor, ha valaki neki felróható módon jogellenes magatartást tanúsít. A jogi felelősség (hagyományosan) két tényező bekövetkezése esetén áll be. Az objektív feltétel a jogellenes magatartás (jogsértés) megvalósítása és annak megállapítása erre feljogosított szerv által. A szubjektív feltétel a felróhatóság (vétkesség), amely az elkövető személyéhez kötődik, és a jogsértő tudati viszonyulását fejezi ki saját cselekményéhez; két alakzata a szándékosság és a gondatlanság. A hagyományos koncepciót olyan módosult formák egészítik ki (pl. objektív felelősség), amelyekben a jogellenes magatartás vagy a felróhatóság nem szükségszerű feltétel.","hv":"4.3 (4637-4657. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/36","pont":10,"q":"Határozza meg a közszolgálati etikai felelősség fogalmát és funkcióit!","ks":["etikai felelősség","etikai vétség","hivatásetikai alapelvek","hivatásetikai kódex","nem jogi felelősség","jogi normák kiegészítése","közéleti anomáliák","magyar kormánytisztviselői kar"],"mv":"A közszolgálati (etikai) felelősség az államigazgatási dolgozókra vonatkozó nem jogi felelősségi forma, amely etikai vétség elkövetésekor áll be – ha a dolgozó megszegi az etikai szabályokat (a hivatásetikai alapelveket és részletszabályokat, amelyeket a Kormánytisztviselői Hivatásetikai Kódex foglal össze). Funkciója kettős: egyrészt megragad olyan közösségellenes anomáliákat, torzulásokat, amelyek tételesen jogszabályt nem sértenek, de nemkívánatosak a közigazgatásban; másrészt kiegészíti, pontosítja a jogi normákat (a határozatlan jogi fogalmakat, pl. méltányosság, szokásos mértékű ajándék, alkalomhoz illő öltözet). Az etikai szabályok nem jogi normák. Az etikai eljárás lefolytatására a Magyar Kormánytisztviselői Kar jogosult.","hv":"4.4 (4858-4879. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/37","pont":10,"q":"Jellemezze – általában véve - az utóbbi évtizedek globális közigazgatási reformirányzatait, különös tekintettel sikeresség feltételrendszerére és nevezze meg a fontosabb reformirányzatokat!","ks":["közigazgatási reformirányzatok","sikeresség feltételei","helyi viszonyok","megvalósíthatóság","tudományos megalapozottság","szakmai elfogadottság","public choice","új közigazgatás","npm","neoweberi","good governance"],"mv":"Az utóbbi évtizedek meghatározó globális közigazgatási reformirányzatai: a közösségi döntések elmélete (public choice, 1960-as évek – a bürokrácia saját érdekeit nézi, verseny bevezetése a közszektorban); az Új Közigazgatás (New Public Administration, 1970–80-as évek – demokratikus kontroll, ügyfélközpontúság); az Új Közmenedzsment (NPM, 1980-as évek – piac és verseny, kisebb állam, decentralizáció, dereguláció); az Új weberizmus / neoweberi állam (2000-es évek – az állam szerepének növelése, közigazgatási jog erősítése); és a Jó kormányzás (good governance, 2000-es évek – társadalmi szereplők, civilek bevonása). A reformok sikerének feltétele, hogy figyelembe vegyék a helyi viszonyokat (jogi, társadalmi, gazdasági, kulturális sajátosságok), a megvalósíthatóság feltételrendszerét, valamint a tudományos megalapozottságot és a szakmai elfogadottságot.","hv":"5.2 (5006-5083. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/38","pont":10,"q":"Ismertesse, hogy mi jellemzi a Good Governance (jó kormányzás) irányzatot!","ks":["good governance","jó kormányzás","governance","hálózatos együttműködés","civil társadalom","magánszektor bevonása","részvétel","átláthatóság","elszámoltathatóság","konszenzus","undp"],"mv":"A good governance (jó kormányzás) irányzat a múlt század utolsó évtizede óta van jelen. A governance a kormányzás olyan formáját jelenti, amely hálózatokban gondolkodik – szemben a government-tel, amely magát a Kormányt jelenti. Lényege, hogy az állam (Kormány) mellett további szereplők – a magánszektor és a civil társadalom – együttműködését feltételezi a társadalom érdekeinek sokrétű artikulációja érdekében, a központi mellett a decentralizált szinteken is. A jó kormányzás velejárói: részvételen alapuló (participatív), átlátható és elszámoltatható, hatékony (a forrásokat jól használja fel), igazságos, és elősegíti a jogállamiság megvalósulását, konszenzusra törekszik. Az ENSZ (UNDP), az OECD és más nemzetközi szervezetek is támogatják.","hv":"5.2.2 (5221-5262. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/39","pont":10,"q":"Ismertesse, hogy miben áll a neo-weberi állam és közigazgatás lényege!","ks":["neoweberi állam","pollitt","bouckaert","weber","npm mixtúrája","állam szerepének megerősítése","közigazgatási jog erősítése","kifelé orientáció","ügyfél","ex post ellenőrzés","professzionalizáció"],"mv":"A neoweberi állam (Pollitt és Bouckaert nevéhez köthető) az ezredforduló után, az NPM kudarcaira (és a 2008-as válságra) válaszként született kontinentális európai reformmodell; a klasszikus weberi és az NPM-megoldások mixtúrája. „Weberi”, mert megtartja a hagyományos közigazgatás életképes elemeit: az állam szerepének megerősítése (vannak feladatok, amelyeket csak az állam láthat el), a reprezentatív demokrácia és a korszerűsített közigazgatási jog megerősítése, a sajátos státuszú közszolgálat eszméje. „Neo”, mert új elemekkel egészíti ki: elmozdulás a befelé forduló bürokratikus szabályoktól a kifelé, az állampolgári igények felé fordulás irányába (minőség, professzionális szolgáltatáskultúra); a reprezentatív demokrácia kiegészítése konzultációs eszközökkel; az eredményorientáció (ex ante helyett ex post ellenőrzés); valamint a közszolgálat professzionalizálása (a bürokratából ügyfélközpontú menedzser).","hv":"5.2.3 (5287-5351. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/40","pont":10,"q":"Ismertesse a közigazgatás-fejlesztésben részt vevő nemzetközi szervezetek tevékenységét, típusait és minden típusra írjon legalább 1-1 példát!","ks":["nemzetközi szervezetek","univerzális","regionális","oecd","világbank","imf","ensz","európa tanács","eupan","iias","eipa","sigma","közigazgatás-fejlesztés"],"mv":"A közigazgatás-fejlesztésben részt vevő nemzetközi szervezetek két nagy típusba sorolhatók. Az univerzális (globális) szervezetek pl.: az OECD (Gazdasági Együttműködési és Fejlesztési Szervezet – kutatás, összehasonlító jelentések, pl. Government at a Glance; szervezeti egységei a PUMA és a SIGMA), a Világbank, az IMF (Nemzetközi Valutaalap), az ENSZ (UNDP programmal); valamint az IIAS (Nemzetközi Közigazgatás-tudományi Intézet, tudományos szervezet). A regionális (európai) szervezetek pl.: az Európa Tanács (Helyi Önkormányzatok Európai Chartája), az EU, az EUPAN (Európai Közigazgatási Hálózat – a tagállamok közigazgatás-fejlesztési főigazgatóinak informális hálózata), az EIPA (Európai Közigazgatási Intézet) és a NISPAcee. Ezeknek többnyire nem kizárólagos profiljuk a közigazgatás-fejlesztés, de tagországaik fejlesztését ajánlásokkal, kutatással, tapasztalatcserével segítik.","hv":"5.3.2 (5421-5563. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/41","pont":10,"q":"Ismertesse, hogy az Európai Unió milyen kötelezettségeket ír elő a tagállamok számára közigazgatásuk kialakítása tekintetében!","ks":["európai unió","tagállami kötelezettség","nincs kötelező modell","közigazgatási kapacitás","acquis integrálása","hatékony végrehajtás","lojalitás klauzula","koppenhágai kritériumok","csatlakozási feltétel"],"mv":"Az Európai Unió joga nem tartalmaz kötelezően alkalmazandó rendelkezéseket arra, hogy milyen közigazgatási modellt kell megvalósítani – a közigazgatás felépítése, mérete, működési elvei, a közszolgálati modell megválasztása tagállami kompetencia. Az EU ugyanakkor elvárásokat támaszt: a tagállamoknak megfelelő közigazgatási kapacitással kell rendelkezniük (ezt a 2004-es keleti bővítéskor a csatlakozási feltételek között fogalmazták meg). A tagállamok kötelesek az uniós vívmányokat (acquis) jog- és intézményrendszerükbe integrálni, és alkalmasnak kell lenniük az uniós jogszabályok, politikák hatékony érvényesítésére, végrehajtására. Az EUSZ 4. cikk (3) szerinti lojalitás (lojális együttműködés) klauzula előírja, hogy a tagállamok megteszik az uniós jog végrehajtásához szükséges intézkedéseket, és tartózkodnak a célokat veszélyeztető lépésektől.","hv":"5.4 (5569-5613. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/42","pont":10,"q":"Soroljon fel 10 olyan célkitűzést (területet/lépést/intézkedést), amelyek az ezredforduló utáni közigazgatás-fejlesztés nemzetközi gyakorlatára jellemzőek!","ks":["ezredforduló utáni tendenciák","ügyfélközpontú közigazgatás","közszolgáltatások színvonala","kiadások csökkentése","hatékonyság","decentralizáció","dereguláció","e-közigazgatás","teljesítménymenedzsment","egyablakos ügyintézés","adminisztratív terhek csökkentése","nyitott kormányzás"],"mv":"Az ezredforduló utáni közigazgatás-fejlesztés nemzetközi gyakorlatára jellemző célkitűzések, intézkedések (tíz példa): 1. állampolgárbarát/ügyfélközpontú közigazgatás megvalósítása; 2. a közszolgáltatások színvonalának emelése; 3. a közszektor kiadásainak csökkentése; 4. a hatékonyság, eredményesség növelése; 5. a teljesítményelv bevezetése (teljesítménymenedzsment); 6. nyitott közigazgatás/kormányzás, a külső kontroll erősítése; 7. decentralizáció és dekoncentráció; 8. dereguláció és a jogszabályok előzetes/utólagos hatásvizsgálata; 9. az elektronikus kormányzás bevezetése és kiterjesztése; 10. az egyablakos ügyintézési modell bevezetése, az adminisztratív terhek csökkentése és az ügymenet egyszerűsítése. Ide tartozik még a piaci mechanizmusok (kiszervezés, PPP) alkalmazása és a magánszféra HR-eszközeinek átvétele (pl. egyéni teljesítményértékelés, munkaköralapú rendszer).","hv":"5.5 (5689-5749. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/43","pont":10,"q":"Mutassa be a Magyary Programok 'Személyzet' beavatkozási területét és nevesítsen négy intézkedést, amely a programok szellemében valósult meg az utóbbi években!","ks":["magyary program","személyzet","beavatkozási terület","életpályamodell","karrierrendszer","munkakör alapú","rendszerirányító centrum","hivatásetikai normák","horizontális mobilitás","átjárhatóság","magyar kormánytisztviselői kar"],"mv":"A Magyary Programok négy beavatkozási területe a szervezet, a feladat, az eljárás és a személyzet. A „Személyzet” beavatkozási terület átfogó célrendszert határozott meg a személyi állomány megújítására; a személyzet fogalmát kiterjesztően értelmezte (kormánytisztviselők, katonák, rendőrök, hivatásos állomány). Olyan életpályamodellt vizionált, amely megőrzi a karrierrendszer előnyeit, de rugalmas alkalmazkodást is lehetővé tesz, valamint a kormánytisztviselői, honvédi és rendészeti életpályák közötti átjárhatóságot (horizontális mobilitást). Négy, a programok szellemében megvalósult intézkedés: a Magyar Kormánytisztviselői Kar (és a Magyar Rendvédelmi Kar) létrehozása; a hivatásetikai normák (Hivatásetikai Kódex) megalkotása; a közös kapcsolódási pontok kialakítása (kiválasztás, értékelés, előmenetel, képzési-továbbképzési rendszer); valamint a Kormányzati Személyzeti Stratégia elfogadása és a személyzetpolitikát koordináló rendszerirányító centrum létrehozása.","hv":"5.6.1.1 (5887-5904. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"10/44","pont":10,"q":"Nevezze meg és röviden ismertesse a magyar közigazgatásban 2010 óta meghirdetett jelentős és átfogó közigazgatás-fejlesztési programokat, azok célját, szempontjait, intézkedési területeit!","ks":["2010 utáni programok","magyary zoltán közigazgatás-fejlesztési program","mp 11.0","mp 12.0","közigazgatás- és közszolgáltatás-fejlesztési stratégia","jó állam","szervezet feladat eljárás személyzet","hatékony nemzeti közigazgatás"],"mv":"A magyar közigazgatásban 2010 óta meghirdetett jelentős, átfogó közigazgatás-fejlesztési programok: a Magyary Zoltán Közigazgatás-fejlesztési Program 11.0 (2011) és 12.0 (2012), valamint a Közigazgatás- és Közszolgáltatás-fejlesztési Stratégia 2014–2020. A Magyary Programok célja a hatékony nemzeti közigazgatás megteremtése és a közszolgáltatások színvonalának emelése volt, két szempontot szem előtt tartva: a hatékonyság és az állampolgárok/vállalkozások életének egyszerűbbé tétele. A programok négy beavatkozási területre (szempontra) épültek: szervezet, feladat, eljárás, személyzet; a Jó Állam Fejlesztési Program keretében a kormányigazgatás, az igazságügyi és önkormányzati igazgatás kölcsönhatásban alakult (Jó Állam Index). A programok helyzetfelméréssel kezdődtek, és az intézkedések évenkénti ciklikus újratervezésére épültek.","hv":"5.6.1 (5792-5958. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/1","pont":5,"q":"Határozza meg, hogy mit jelent a municipiális hatalom és milyen történelmi kontextusban jelent meg!","ks":["municipiális hatalom","benjamin constant","helyi önkormányzatiság","önálló hatalmi tényező","eötvös józsef","1848","igazgatási decentralizáció","helyi közhatalom"],"mv":"A municipiális hatalom kifejezés Benjamin Constant nevéhez köthető; mai értelmezése a helyi önkormányzatiságot mint önálló hatalmi tényezőt jelenti. A gondolat – a helyi közösségeket megillető, saját ügyeik intézésének jogából eredő önálló hatalmi jogosítványok – korábban jelent meg, mint a modern szövetségi államok. Magyarországon 1848-ban Eötvös József nevéhez köthetően jelent meg. Fenntartással kezelendő, mert az igazgatási decentralizáció keretében létrehozott modern helyi önkormányzatok a közigazgatás részeként működnek, és eszközeik a helyi közhatalom gyakorlására korlátozódnak.","hv":"1.1 (323-336. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/2","pont":5,"q":"Ismertesse, hogy mely államigazgatási, illetve közigazgatási normatív aktusok képezik utólagos normakontroll tárgyát és mely szervek bírálják el ezeket!","ks":["utólagos normakontroll","alkotmánybíróság","rendelet","normatív határozat","normatív utasítás","kúria","önkormányzati rendelet","alaptörvénybe ütközés","megsemmisítés"],"mv":"A jogalkotásra jogosult államigazgatási szervek normatív aktusai – a rendeletek, normatív határozatok és normatív utasítások – az Alkotmánybíróság előtt megtámadhatók (utólagos normakontroll). Az Alkotmánybíróság megsemmisíti a megtámadott rendeletet vagy közjogi szervezetszabályozó eszközt, illetve egyes rendelkezéseit, ha az ellentétes az Alaptörvénnyel vagy magasabb szintű jogszabállyal. Az önkormányzati rendeletek normakontrollja csak akkor tartozik az Alkotmánybíróság hatáskörébe, ha a vizsgálat tárgya az Alaptörvénybe ütközés; a magasabb szintű jogszabályba ütköző önkormányzati rendeletet a Kúria (Önkormányzati Tanácsa) vizsgálja felül.","hv":"1.2.6 (589-598. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/3","pont":5,"q":"Ismertesse az alapvető jogok biztosa és az államigazgatás viszonyát, valamint az alapvető jogok biztosa által alkalmazható eszközöket!","ks":["alapvető jogok biztosa","ombudsman","alapjogvédelem","országgyűlés ellenőrző szerve","visszásság","ajánlás","bírósági alkotmánybírósági eljárás","nyilvánosság","egyenlő bánásmód"],"mv":"Az alapvető jogok biztosa (ombudsman) alapjogvédelmi tevékenységet lát el, eljárását bárki kezdeményezheti; az Országgyűlés ellenőrző szerve, akit helyetteseivel együtt az Országgyűlés választ. Feladata az alkotmányos jogokat sértő visszásságok kivizsgálása, hatásköre a közigazgatás egészére kiterjed. Érdemi intézkedési jogosultsága általában nincs: az alapvető jogok sérelme esetén ajánlással fordul az ellenőrzött szerv felé, bírósági vagy alkotmánybírósági eljárást kezdeményezhet, illetve a nyilvánossághoz fordulhat. Kivételként 2021. január 1-je óta közigazgatási hatóságként jár el az egyenlő bánásmód követelményének megsértése miatti eljárásokban.","hv":"1.2.8 (616-627. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/4","pont":5,"q":"Ismertesse az Állami Számvevőszék és az államigazgatás viszonyát, valamint az Állami Számvevőszék által alkalmazható eszközöket!","ks":["állami számvevőszék","országgyűlés pénzügyi ellenőrző szerve","gazdálkodás","törvényesség","célszerűség","eredményesség","bírósághoz fordulhat","zárolás","felfüggesztés","nyilvánosságra hozza"],"mv":"Az Állami Számvevőszék az Alaptörvény szerint az Országgyűlés pénzügyi és gazdasági ellenőrző szerve. Jogosult valamennyi közigazgatási szerv gazdálkodását ellenőrizni; az ellenőrzés nem csak a törvényességre, hanem a célszerűségre és az eredményességre is kiterjed. Ellenőrzési jogosítványai korlátozottak: jogszabálysértés esetén bírósághoz fordulhat, az eredményeket nyilvánosságra hozza. Intézkedési jogköre keretében zárolás iránt intézkedhet, és a pénzeszközök további felhasználását felfüggesztheti. A számvevőszéki ellenőr akadályozása bűncselekmény, és büntethető az állami szerv vezetője is, ha írásbeli felszólítás ellenére nem küld intézkedési tervet.","hv":"1.2.7 (601-613. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/5","pont":5,"q":"Ismertesse, hogy mi jellemzi a helyi önkormányzatokat megillető véleményezési és javaslattételi jogot, továbbá fejtse ki azok tartalmát!","ks":["véleményezési jog","javaslattételi jog","helyi önkormányzat","helyi közügyek","tájékoztatás kérése","döntés kezdeményezése","harminc nap","érdekszövetség","konzultáció","alaptörvény 32. cikk"],"mv":"Az Alaptörvény 32. cikke szerint a helyi önkormányzat a helyi közügyek intézése körében törvény keretei között a feladat- és hatáskörrel rendelkező szervtől tájékoztatást kérhet, döntést kezdeményezhet, véleményt nyilváníthat. Az Mötv. 7. §-a szerint a megkeresett szerv harminc napon belül köteles érdemben válaszolni, illetve ha nem az ő hatáskörébe tartozik, nyolc napon belül áttenni a hatáskörrel rendelkező szervhez (a harmincnapos határidő az Országgyűlésre nem vonatkozik). A helyi önkormányzatok országos érdekszövetségei javaslatot tehetnek jogalkotási feladatokra, intézkedésekre, és konzultációt folytathatnak a Kormánnyal az önkormányzati rendszert és a közszolgáltatásokat érintő stratégiai kérdésekről.","hv":"1.3.4 (845-861. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/6","pont":5,"q":"A magyar közigazgatás két alrendszere között a relatív szétválasztásuk ellenére vannak kapcsolódási pontok. Nevezze meg ezeket!","ks":["kapcsolódási pontok","két alrendszer","törvényességi felügyelet","államigazgatási feladatok","területszervezés","véleményezési és javaslattételi jog","államigazgatás","helyi önkormányzati igazgatás"],"mv":"A magyar közigazgatás két alrendszere – az államigazgatás és a helyi önkormányzati igazgatás – relatív szétválasztásuk ellenére számos kapcsolódási ponttal rendelkezik. A legjelentősebb a törvényességi felügyelet, amely révén az államigazgatás biztosítja a helyi önkormányzatok jogszerű működését. Kapcsolódási pontot jelentenek azok az államigazgatási feladatok, amelyeket helyi önkormányzati szervek látnak el. Az önkormányzati rendszer területi kereteit meghatározó területszervezés is lehetőséget ad az államigazgatásnak a befolyásgyakorlásra. Végül lényeges összetevő az önkormányzatokat megillető véleményezési és javaslattételi jog.","hv":"1.3 (709-716. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/7","pont":5,"q":"Határozza meg a tutela fogalmát!","ks":["tutela","felügyeleti viszony","decentralizált szerv","állami felügyelet","törvényességi felügyelet","autonómia","korlátozott","helyi önkormányzat"],"mv":"A tutela a decentralizált szervek (jellemzően a helyi önkormányzatok) felett gyakorolt állami felügyeleti viszonyt jelöli. Mivel a decentralizált szervek autonómia birtokában, hierarchikus felettes nélkül működnek, az állam nem irányítja, hanem csak felügyeli őket: a tutela a decentralizált szervek önállóságát tiszteletben tartó, korlátozott állami kontroll, amely elsősorban a törvényes működés biztosítására (törvényességi felügyelet) terjed ki, nem pedig a célszerűség vagy a szakmai megfelelőség vizsgálatára. A tutela tehát a felügyelet sajátos formája, amely az autonómiát nem számolja fel, csak a jogszerűséget garantálja.","hv":"2.1.1 / 2.3 (decentralizáció, felügyelet)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/8","pont":5,"q":"Soroljon fel ötöt a Kit.-ben meghatározott, kormánytisztviselőre vonatkozó hivatás-etikai alapelvekből!","ks":["hivatás-etikai alapelvek","kit","elkötelezettség","nemzeti érdekek előnyben részesítése","igazságosság","méltányosság","méltóság","tisztesség","előítéletektől való mentesség","felelősségtudat"],"mv":"A Kit. szerint a kormánytisztviselőkre vonatkozó hivatás-etikai alapelvek különösen a következők (ötöt felsorolva): az elkötelezettség, a nemzeti érdekek előnyben részesítése, az igazságosság, a méltányosság, a méltóság, a tisztesség, az előítéletektől való mentesség és a felelősségtudat. Az egyes alapelveket a Kormánytisztviselői Hivatásetikai Kódex bontja ki részletesen; megsértésük esetén a Magyar Kormánytisztviselői Kar etikai eljárást folytathat le.","hv":"4.4 (4909-4918. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/9","pont":5,"q":"Határozza meg Miniszterelnöki Kabinetiroda jogállását és funkcióit!","ks":["miniszterelnöki kabinetiroda","kormányzati központ","minisztérium","miniszterelnök munkaszervezete","kabinetfőnök","általános politikai koordináció","kormányzati kommunikáció","miniszterelnöki kormányiroda"],"mv":"A Miniszterelnöki Kabinetiroda a Kormányzati Központ minisztériumaként a miniszterelnök munkaszervezete. Vezetője a miniszterelnök kabinetfőnöke, aki miniszterként vezeti. Funkciói: a Kormány kormányzati általános politikai koordinációért, valamint több szakpolitikai feladatért (pl. kormányzati kommunikáció, országmárka, a polgári nemzetbiztonsági szolgálatok és a hírszerzési tevékenység irányítása, a minősített adatok védelmének szakmai felügyelete) felelős tagja. Szervezeti szempontból a Kabinetiroda részét képezi a Miniszterelnöki Kormányiroda is.","hv":"2.4.2.3 (2398-2406. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/10","pont":5,"q":"Ismertesse, hogy milyen előnyökkel, illetve hátrányokkal jár a centralizáció a közigazgatásban!","ks":["centralizáció","összpontosítás","központi kormányzat","egységes","uniformizált","hierarchia","dekoncentráció","nemzeti egység","merev","működésképtelen"],"mv":"A centralizáció azt jelenti, hogy egy helyre (a központi kormányzatba) összpontosítják az irányítási jogosítványokat, a szakértelmet és a rendelkezés jogát, így a központi hatalom akarata mindenütt azonos hatékonysággal érvényesül. Előnye, hogy biztosítja a közigazgatás egységét, az uniformizált működést, amely nélkül nincs nemzeti egység. Hátránya, hogy az abszolút centralizált rendszer mereven hierarchikus, a gyakorlatban működésképtelen lenne, mert a központi szerveket jelentéktelen ügyekkel terhelné le, és nem veszi figyelembe a helyi sajátosságokat. Ezért a centralizációt a dekoncentráció elvével egészítik ki, amely technikai munkamegosztásként a helyi szinten dolgozó hivatalnokokat korlátozott döntési joggal ruházza fel.","hv":"2.1.1 (1110-1140. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/11","pont":5,"q":"Foglalja össze, hogy mit kell tudni az illetékességről!","ks":["illetékesség","földrajzi terület","jogszabály","illetékességi ok","ügyfél lakóhelye","ingatlan fekvése","területi munkamegosztás","azonos hatáskör"],"mv":"Az illetékesség az államigazgatásban érvényesülő területi alapú munkamegosztást fejezi ki. Az illetékességi terület az a földrajzi terület, amelyen egy államigazgatási (tágabban állami) szerv jogosult működni; ezt minden szervnél jogszabály határozza meg. Az illetékességi terület mellett jogszabály határozza meg az illetékességi okokat is. A kettő együtt szükséges annak eldöntéséhez, hogy az azonos feladat- és hatáskörrel rendelkező szervek közül konkrétan melyik jogosult eljárni egy adott ügyben (azaz mely szerv illetékes). Gyakori illetékességi ok az ügyfél lakóhelye, egy cselekmény végzésének helye vagy az ingatlan fekvése.","hv":"2.2.2 (1275-1283. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/12","pont":5,"q":"Mutassa be a közigazgatási és területfejlesztési miniszter kormányhivatal felett gyakorolt irányítási jogkörét!","ks":["közigazgatási és területfejlesztési miniszter","kormányhivatal irányítása","nem teljes körű","nem jogosult alapításra","főispán kinevezése","miniszterelnök","szmsz kiadása"],"mv":"A fővárosi és vármegyei kormányhivatal a közigazgatási és területfejlesztési miniszter irányítása alatt áll, de a miniszter irányítási joga nem teljes körű. Egyfelől a miniszter nem jogosult a kormányhivatal alapítására és megszüntetésére (ezt törvény, illetve a Kormány teszi). Másfelől a kormányhivatal vezetőjét (a főispánt) sem ő nevezi ki és menti fel, hanem – a miniszter javaslatára – a miniszterelnök. A miniszter ugyanakkor kiadja a kormányhivatal szervezeti és működési szabályzatát normatív utasításban, és a kinevezés-felmentés kivételével gyakorolja a munkáltatói jogokat a főispán felett.","hv":"2.5.2.1 (2737-2742. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/13","pont":5,"q":"Mutassa be a szakmai irányító miniszterek irányítási jogosítványait a kormányhivatal felett gyakorolt irányítási jogkörben!","ks":["szakmai irányító miniszter","kormányhivatal szakmai irányítása","döntés megsemmisítése","egyedi utasítás","jóváhagyás","jelentéstétel","törvényességi és szakszerűségi ellenőrzés","együttműködés"],"mv":"A fővárosi és vármegyei kormányhivatal szakmai irányításában – kormányrendeletben foglaltak szerint – másik miniszter (szakmai irányító miniszter) is közreműködhet. Kormányrendelet rendelkezhet úgy, hogy ügyek egyes csoportjaival összefüggésben a szakmai irányító miniszter gyakorolja a következő jogosítványokat: a döntés megsemmisítése és új eljárásra utasítás, a döntés előzetes vagy utólagos jóváhagyása, egyedi utasítás kiadása feladat elvégzésére vagy mulasztás pótlására, jelentéstételre vagy beszámolóra kötelezés, törvényességi és szakszerűségi ellenőrzés, valamint az Ákr.-ben a felügyeleti szervre ruházott jogkörök. A szakmai irányító miniszterek e tevékenységük kapcsán kötelesek együttműködni a közigazgatási és területfejlesztési miniszterrel.","hv":"2.5.2.1 (2743-2758. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/14","pont":5,"q":"Határozza meg az irányítás fajtáit az irányítás irányultsága alapján!","ks":["irányítás irányultsága","szakmai irányítás","szervezetirányítás","teljes irányítási jogkör","szakmaspecifikus","szervezeti működés","ágazat"],"mv":"Az irányultsága alapján az irányítás háromféle lehet. A szakmai irányítás kizárólag az irányított szakmai tevékenységére korlátozódik, és mivel igazgatási ágazatonként a szakmai feladatok különböznek, a szakmai irányítás ágazatonként sajátos. A szervezetirányítás a szervezeti működést célozza, ami nem szakmaspecifikus feladatokat ölel fel, így minden szervezet esetén azonos, függetlenül az ágazattól. A legszigorúbb a teljes irányítási jogkör, amely kiterjed mind az irányított szakmai, mind a szervezeti működésére.","hv":"2.3 (1526-1548. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/15","pont":5,"q":"Határozza meg, hogy miben mutatkoznak meg az irányítás és a vezetés azonosságai és különbségei!","ks":["irányítás","vezetés","ellenőrzés részjogosítvány","hierarchikus","része a szervezetnek","nem része a szervezetnek","szervezeten belüli","szervezetek közötti"],"mv":"Az irányítás és a vezetés azonossága, hogy mindkettő hierarchikus viszonyok között valósul meg, és mindkettőnek részjogosítványa az ellenőrzés. A lényeges különbség, hogy a vezetés szervezeten belüli tevékenység: a vezető maga is része az általa vezetett szervezetnek, annak a hierarchiában legmagasabb szinten elhelyezkedő tagja, akinek minden más szervezeti egység vagy dolgozó az alárendeltje. Ezzel szemben az irányítás szervezetek közötti viszony: aki irányítást gyakorol, nem része az általa irányított szervezetnek. Az ellenőrzés ezért a vezetésnél szervezeten belüli, az irányításnál szervezetek közötti részjogosítványként jelenik meg.","hv":"2.3 (1460-1467. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/16","pont":5,"q":"Mutassa be a Miniszterelnökség jogállását és funkcióit!","ks":["miniszterelnökség","kormányzati központ","minisztérium","koordinációs feladatok","szakpolitikai feladatok","miniszterelnököt vezető miniszter","közigazgatás fejlesztése","kormánybiztosok összehangolása"],"mv":"A Miniszterelnökség a Kormányzati Központ részét képező minisztérium, amelynek – a szakpolitikai feladatok mellett – jelentős kormányzati, illetve politikai koordinációs funkciói is vannak. Vezetője a Miniszterelnökséget vezető miniszter. Koordinációs feladatai közé tartozik például a kormánybiztosok tevékenységének, a kormányzati társadalmi kapcsolatoknak és társadalompolitikai feladatoknak az összehangolása, egyes közigazgatási minőség- és személyzetpolitikai feladatok. Szakpolitikai feladatai közé tartoznak például az állampolgársági ügyek és a közigazgatás fejlesztése (a Nemzeti Közszolgálati Egyetemmel kapcsolatos feladatok). Itt működik a miniszterelnök általános helyettese is.","hv":"2.4.2.3 (2331-2396. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/17","pont":5,"q":"Jellemezze a tárca nélküli minisztert!","ks":["tárca nélküli miniszter","kormány által meghatározott feladatkör","nincs minisztériuma","kijelölt minisztérium segíti","politikai felsővezető","statútum rendelet","miniszterelnök általános helyettese"],"mv":"A tárca nélküli miniszter olyan miniszter, akit az Alaptörvény alapján a Kormány által meghatározott feladatkör ellátására neveznek ki, és aki – szemben a szakminiszterekkel – nem vezet minisztériumot (nincs saját tárcája). Részletes feladat- és hatáskörét a Kormány rendeletben (statútum) állapítja meg, tevékenységét a Kormány eredeti jogalkotói hatáskörében kijelölt minisztérium segíti. Politikai szolgálati jogviszonyban áll, politikai felsővezető. 2022-től a tárca nélküli minisztereket feladat- és hatáskörük megjelölésével nevezik ki; jelenleg ilyen a miniszterelnök általános helyettese (a nemzetpolitikáért, egyházpolitikáért stb. felelős miniszter).","hv":"2.4.2.2 (2130-2142. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/18","pont":5,"q":"Sorolja fel a Kormány segédszerveit!","ks":["kormány segédszervei","kabinet","kormánybizottság","közigazgatási államtitkári értekezlet","kormánybiztos","javaslattevő testület","tanácsadó","interminiszteriális bizottság"],"mv":"A Kormány segédszervei a Kormány működésének ülésen kívüli, további szervezeti formái, többségükben testületek. Ezek: a kabinet, a kormánybizottság, a Közigazgatási Államtitkári Értekezlet, valamint a Kormány egyéb javaslattevő, véleményező vagy tanácsadói tevékenységet végző testületei (tárcaközi/interminiszteriális bizottságok). A Kormány segédszerve a kormánybiztos is, aki azonban a testületi szervekkel szemben egyszemélyi vezető.","hv":"2.4.2.1 (1915-1921. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/19","pont":5,"q":"Sorolja fel, hogy - formáját tekintve – milyen döntéseket hozhat a Kormány!","ks":["kormány döntései","rendelet","határozat","irányelv","elvi állásfoglalás","testületi","jogalkotás","kormányrendelet","kormányhatározat"],"mv":"A Kormány testületi szerv, döntéseit testületi formában, a Kormány vagy a kabinet ülésén hozza. A Kormány döntése formáját tekintve négyféle lehet: rendelet, határozat, irányelv vagy elvi állásfoglalás. A kormányrendelet jogszabály, amely törvényben nem szabályozott tárgykörben vagy törvényi felhatalmazás alapján alkotható, és nem lehet ellentétes törvénnyel vagy az Alaptörvénnyel. A kormányhatározat a Kormány saját és az alárendelt szervek tevékenységét szabályozza. Az irányelv és az elvi állásfoglalás a jogalkalmazás iránymutatására, illetve elvi kérdések rendezésére szolgál.","hv":"2.4.1.2 (1721-1722. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/20","pont":5,"q":"Határozza meg, hogy milyen a Kormány ülésével kapcsolatos, lényeges döntési jogosítványai vannak a miniszterelnöknek!","ks":["miniszterelnök","kormány ülése","döntést kimondja","aláírja","napirend jóváhagyása","ülés vezetése","általános politika meghatározása","feladatszabás","nyilvánosság"],"mv":"A miniszterelnöknek a Kormány ülésével kapcsolatban kiemelt döntési jogosítványai vannak. Ő hagyja jóvá az ülés napirendjének javaslatát, és vezeti a Kormány ülését. A nemzetközi gyakorlattal egyezően formális szavazás nincs: a tanácskozás után a miniszterelnök összefoglalja az elhangzottakat és kimondja a Kormány döntését, valamint aláírja a döntés véglegesített szövegét. Ő dönt arról is, hogy az ülés (kivételesen) nyilvános-e, illetve hogy a döntésekről eltérő kihirdetési határidőt állapít-e meg. A Kormány általános politikáját a miniszterelnök határozza meg, és jogosult feladatot szabni a kormánytagoknak.","hv":"2.4.1.2 (1720-1786. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/21","pont":5,"q":"Ismertesse, hogy hogyan határozza meg a közigazgatás funkcióit a szociológia!","ks":["szociológia","integráció","allokáció","érdekek becsatornázása","erőforrások elosztása","alrendszerek","egyensúly","semleges közvetítő"],"mv":"A szociológia szerint a közigazgatás két funkciója az integráció és az allokáció. Az integráció a társadalomban megjelenő különböző érdekek becsatornázását és kiegyenlítését jelenti: a csoportérdekekből egységes nemzeti érdek szintetizálását, valamint a társadalmi alrendszerek közötti összhang és egyensúly megteremtését. A közigazgatás semleges, bürokratikus közegként közvetít az alrendszerek között, és nem engedi, hogy egyik (pl. a gazdaság vagy a politika) eluralja a többit. Az allokáció a társadalomban különböző helyen és időben rendelkezésre álló erőforrások kiegyenlítését, egyenletes elosztását jelenti az ország kiegyensúlyozott fejlődése érdekében.","hv":"3.1.1 (3191-3209. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/22","pont":5,"q":"Ismertesse, hogy milyen lehetséges értelmezésekben jelenik meg az államigazgatás funkciójaként a végrehajtás és mit értünk annak tartalmán!","ks":["végrehajtás","jogszabályok végrehajtása","jogalkotás","jogalkalmazás","szervezés","közhatalom","wilson","politikai döntések végrehajtása"],"mv":"A közigazgatási jogtudomány és a politikatudomány a közigazgatás (államigazgatás) funkcióját a végrehajtásban, nevezetesen a jogszabályok végrehajtásában jelöli meg. Wilson megfogalmazásában a közigazgatás végrehajtja azokat a döntéseket, amelyeket a politikusok meghoznak; a közigazgatás a népképviseleti szervek jogszabályokban megjelenő döntéseit készíti elő és hajtja végre. A végrehajtást a közigazgatás három tevékenység útján valósítja meg: jogalkotás (arra feljogosított szervei maguk is alkotnak jogot), jogalkalmazás (az általános szabályozás egyedi esetekben történő érvényesítése) és szervezés (elsősorban a közszolgáltatások megszervezése).","hv":"3.1.1 (3171-3190. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/23","pont":5,"q":"Ismertesse, hogy milyen módszerrel határozható meg az államigazgatási feladatok köre!","ks":["államigazgatási feladatok köre","jogi szabályozás","joghoz kötöttség","feladatkataszter","egyes szervek feladataiból","jogszabály határozza meg"],"mv":"Az államigazgatási feladatok körének meghatározását a közigazgatás joghoz kötöttségének elve teszi lehetővé: mivel a jogállamban minden államigazgatási szerv feladatait jogszabályoknak kell meghatározniuk, az államigazgatás feladatait az egyes szervek feladataiból, pontosabban az azokat meghatározó jogi szabályozásból lehet levezetni. A módszernek nehézségei vannak: a jog csak az elvárásokat (mit kell tenni) mutatja meg, azt nem, hogy ténylegesen mi valósul meg; továbbá a jogi szabályozás folyamatosan változik. Ezért a tényleges feladatok megismerésére a feladatkataszter (közfeladat-kataszter) összeállítása szolgál.","hv":"3.1.2 (3214-3232. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/24","pont":5,"q":"Soroljon fel legalább 5 olyan hatáskört, amelyet az Áht. határoz meg és alkalmazható a költségvetési szerv irányítása során!","ks":["áht","költségvetési szerv irányítása","alapítás átalakítás megszüntetés","szmsz jóváhagyása","vezető kinevezése","törvényességi szakszerűségi hatékonysági ellenőrzés","döntés megsemmisítése","egyedi utasítás","jelentéstétel"],"mv":"Az Áht. 9. §-a szerint a költségvetési szerv irányítása – eltérő rendelkezés hiányában – többek között a következő hatáskörök gyakorlását jelenti (legalább öt): a költségvetési szerv alapítása, átalakítása és megszüntetése (az alapító, illetve megszüntető okirat kiadása); a szervezeti és működési szabályzat jóváhagyása; a szerv vezetőjének kinevezése/megbízása, felmentése, a munkáltatói jogok gyakorlása; a gazdasági vezető kinevezése/felmentése; a szerv tevékenységének törvényességi, szakszerűségi és hatékonysági ellenőrzése; a szerv döntésének megsemmisítése és új eljárásra utasítás; döntések előzetes vagy utólagos jóváhagyása; egyedi utasítás kiadása feladat elvégzésére vagy mulasztás pótlására; jelentéstételre vagy beszámolóra kötelezés.","hv":"3.2.4.1 (3791-3824. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/25","pont":5,"q":"Nevezze meg a közszolgáltatások ellátásának lehetséges formáit!","ks":["közszolgáltatások formái","közintézet","közüzem","szerződés magánszervezettel","államháztartáson kívüli szervezet","államigazgatási szerv maga látja el","kiszervezés"],"mv":"A közszolgáltatások ellátásának több lehetséges formája van. Az államigazgatási szerv közintézetet vagy közüzemet (intézeti típusú szervet) alapít és bíz meg a feladat ellátásával, miközben a feladatért felelős marad. Az Áht. szerint a közfeladatok ellátásában államháztartáson kívüli szervezet is közreműködhet: az államigazgatás szerződést köthet magántulajdonú gazdasági társasággal vagy más szervezettel (pl. egyesülettel, alapítvánnyal) a közszolgáltatás ellátására (kiszervezés). Végül a közszolgáltatást maga az államigazgatási szerv is elláthatja, bár ez háttérbe szorul, és a hatósági, illetve szolgáltató tevékenység nehezen választható el.","hv":"3.2.4.3 (3981-3990. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/26","pont":5,"q":"Határozza meg a szervezeti és működési szabályzat fogalmát és funkcióját!","ks":["szervezeti és működési szabályzat","szmsz","általános hatályú","szerv vezetője készíti el","irányító szerv jóváhagyása","normatív utasítás","belső igazgatás","szervezet és működés rendje"],"mv":"A szervezeti és működési szabályzat (SZMSZ) az államigazgatási szerv szervezetét és működését alapvető jelleggel meghatározó, az egész szervre kiterjedő hatályú szabályzat; a belső igazgatási tevékenység és a szervezet-működés rendje normatív szabályozásának legfontosabb eszköze. Funkciója, hogy a feladat- és hatáskört megállapító jogszabályi (statútum) kereteket konkrét tartalommal töltse meg. Az SZMSZ-t a szerv vezetője készíti el, és az irányítást gyakorló szerv jóváhagyásához kötött; jellemzően normatív utasítás (testületi szervnél normatív határozat) formájában jelenik meg. Pl. a minisztérium SZMSZ-ét a miniszter – a miniszterelnök jóváhagyását követően – normatív utasításban adja ki.","hv":"3.2.5.1 (4054-4067. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/27","pont":5,"q":"Határozza meg az ex lege szabályozási mód fogalmát!","ks":["ex lege szabályozási mód","közvetlen hatás a jogalanyokra","önkéntes jogkövetés","nincs egyedi aktus","hatósági felügyelet","jogszabályból ered a kötelezettség"],"mv":"Az ex lege szabályozási mód a jogalanyokra közvetlenül hatást gyakorló szabályozási mód, szemben a hatósági jogalkalmazással, amelyben a jogot egyedi államigazgatási aktussal érvényesítik. Ex lege mód esetén a kötelezettség (vagy tilalom) közvetlenül a jogszabály rendelkezéséből ered, és a jogi normának önkéntes jogkövetés útján kell érvényesülnie – nincs szükség egyedi hatósági döntésre. Az államigazgatás feladata ilyenkor a normák megismertetése, majd annak ellenőrzése (hatósági felügyelet), hogy az önkéntes jogkövetés megfelel-e az előírásnak, és eltérés esetén a beavatkozás (pl. az éttermek a fogyasztóvédelmi, közegészségügyi előírásokat ex lege kötelesek betartani, ezt a hatóság ellenőrzi).","hv":"3.2.3.2 (3659-3667. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/28","pont":5,"q":"Határozza meg az intézeti típusú szerv fogalmát, típusait és az elhatárolás alapját!","ks":["intézeti típusú szerv","közszolgáltatás","közintézet","közüzem","anyaközület","alapító közigazgatási szerv","közszolgáltatás jellege","humán","gazdasági"],"mv":"Az intézeti típusú szerv a közigazgatási (államigazgatási) szervek által közszolgáltatások ellátására létrehozott szervtípus. Az alapító (és a feladatért felelős) szervet anyaközületnek is nevezik. Az intézeti típusú szerveknek két fajtája van, az elhatárolás alapja az ellátott közszolgáltatás jellege: a közintézet humán közszolgáltatásokat (pl. oktatás, egészségügy, kultúra) nyújt, jellemzően ingyenesen vagy nem piaci áron; a közüzem gazdasági közszolgáltatásokat (pl. közművek, tömegközlekedés) nyújt, jellemzően piaci áron, mérhető ellenérték fejében.","hv":"3.2.4 (3756-3767. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/29","pont":5,"q":"Határozza meg az államigazgatási jogalkalmazás fogalmát!","ks":["államigazgatási jogalkalmazás","egyedi esetre alkalmazás","általános norma egyediesítése","közhatalom","végrehajtás","állami tevékenység","jogszabály érvényesítése"],"mv":"A jogalkalmazás az általános, személytelen és elvont, mindenkire nézve kötelező jogszabályi rendelkezéseknek az egyénekre, az egyedi esetekre történő alkalmazása – az egyedinek az általánoshoz történő hozzáillesztése – az erre létrehozott állami szervek útján. Állami tevékenység, amelyet elsősorban a bíróságok végeznek, de jogalkalmazó tevékenységet végeznek a közigazgatási, azon belül az államigazgatási szervek is. Az államigazgatási jogalkalmazás sajátossága a funkciója: a közfeladatok megvalósítása közhatalmi eszközökkel, a közérdek védelmében, akár hivatalból is (végrehajtás); az államigazgatási szervek a bírósággal ellentétben emellett más tevékenységet (jogalkotás, szervezés, szolgáltatás) is ellátnak.","hv":"3.2.3.2 (3542-3556. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/30","pont":5,"q":"Foglalja össze, hogy mit kell tudni a hatáskör-átruházás tilalmáról és a szubdelegálás tilalmáról!","ks":["hatáskör-átruházás tilalma","szubdelegálás tilalma","jogszabály engedélye","delegálás","tovább nem ruházható","alapelv","mötv","képviselő-testület"],"mv":"A hatáskör-átruházás tilalma az államigazgatásban általánosan érvényesülő alapelv: mivel hatáskört csak jogszabály állapíthat meg, a hatáskörrel felruházott szerv köteles maga eljárni, és nem jogosult más szervet vagy személyt megbízni a hatáskörébe tartozó feladatok ellátásával. A hatáskör átruházására (delegálására) kizárólag akkor kerülhet sor, ha azt jogszabály kifejezetten megengedi. A szubdelegálás tilalma azt jelenti, hogy a jogszabályi engedély alapján átruházott hatáskört annak jogosultja más szervre tovább már nem ruházhatja. Példa: az Mötv. szerint a képviselő-testület hatásköreit (törvényi kivételekkel) átruházhatja pl. a polgármesterre vagy a jegyzőre, de az átruházott hatáskör tovább nem ruházható.","hv":"3.2.3.2 (3627-3646. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/31","pont":5,"q":"Határozza meg a hatáskör és a feladatkör fogalmát, valamint jellemzőiket!","ks":["hatáskör","feladatkör","feladat","jogi eszközök összessége","jogszabály állapítja meg","engedélyezés","tiltás","szankcionálás","feladatok összessége"],"mv":"A feladat az, amit a jogszabály az államigazgatási szerv számára kötelességként meghatároz; minden szervet valamely feladat ellátására hoznak létre. A szervet jellemzően nem egy, hanem több feladat ellátására hozzák létre: e feladatok összességét nevezzük feladatkörnek. A feladatok ellátásához a szerv jogi eszközöket alkalmaz (pl. engedélyezés, jogosítás, tiltás, szankcionálás), amelyek alkalmasak valamely jogalany jogi helyzetében változást okozni. A feladatkör ellátásához alkalmazható, jogszabályban meghatározott jogi eszközök összessége a hatáskör. Általános szabály, hogy az államigazgatási szervek hatáskörét – akárcsak a feladatait – kizárólag jogszabály állapíthatja meg.","hv":"3.2.3.2 (3609-3626. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/32","pont":5,"q":"Határozza meg az államigazgatás jogalkotó tevékenységét szűk és tág értelemben!","ks":["jogalkotó tevékenység","szűk értelemben","tág értelemben","jogforrás kibocsátása","jogszabály-előkészítés","dereguláció","jat","folyamat szakaszai"],"mv":"Az államigazgatás jogalkotó tevékenysége szűken és tágan is értelmezhető. Szűk értelemben az Alaptörvény és a Jat. alapján megjelölhetők azok a jogalkotásra jogosult államigazgatási szervek, amelyek jogszabályt (pl. rendeletet) vagy közjogi szervezetszabályozó eszközt bocsátanak ki – tehát a jogalkotás itt a jogforrás kibocsátását jelenti. Tág értelemben a jogalkotás felöleli a jogalkotás összetett folyamatának valamennyi szakaszát, amelyek közül a legtöbb a nyilvánosság számára kevésbé látható, de jogilag szigorúan szabályozott. Ezek közül kiemelkedik a jogszabályok előkészítése (amelyben az államigazgatásnak meghatározó szerepe van) és a dereguláció.","hv":"3.2.3.1 (3514-3538. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/33","pont":5,"q":"Határozza meg az államigazgatási tevékenységfajta fogalmát!","ks":["tevékenységfajta","feladatcsoport","lényeges tulajdonság","milyen módon","milyen eszközökkel","igazgatási tevékenység"],"mv":"Az államigazgatási tevékenységfajta fogalma azt mutatja meg, hogy az egyes államigazgatási feladatokat milyen módon, milyen eszközök igénybevételével és milyen igazgatási tevékenység révén látják el. A tevékenységfajták tehát feladatcsoportok, amelyeket valamely lényeges tulajdonságuk fűz össze. Ismeretük elengedhetetlen az államigazgatás működésének megértéséhez; az elméletet a (korábban államigazgatási jogtudománynak nevezett) közigazgatási jogtudomány dolgozta ki.","hv":"3.2.2 (3418-3425. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/34","pont":5,"q":"Határozza meg a közigazgatási személyzeti politika fogalmát!","ks":["közigazgatási személyzeti politika","kiválasztás","képzés","bérezés","előmenetel","jogok és kötelezettségek","hosszú távú","egységes elképzelések","érdekek összeegyeztetése"],"mv":"A közigazgatási személyzeti politika a közigazgatásban alkalmazottak kiválasztására, alkalmazási feltételeire, képzésére, továbbképzésére, képesítésére, minősítésére, bérezésére, előmenetelük feltételeire, valamint jogaikra és kötelezettségeikre vonatkozó, hosszú távra szóló és megfelelő (pl. jogszabályi) formában deklarált egységes elképzelések, célkitűzések összessége. Funkciója, hogy összeegyeztesse a közszolgálatban érdekeltek – az állam, az alkalmazottak és a lakosság – érdekeit, és úgy intézze a személyzet ügyeit, hogy annak teljesítménye a lehető legmagasabb színvonalú legyen.","hv":"4.1 (4214-4221. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/35","pont":5,"q":"Határozza meg, hogy mit értünk a közigazgatási pálya biztonságán!","ks":["pálya biztonsága","elmozdíthatatlanság","elbocsátással szembeni védelem","zárt rendszer","élethivatás","nem szüntethető meg egyoldalúan","karrierrendszer"],"mv":"A közigazgatási pálya biztonsága a zárt (karrier)rendszer egyik sajátossága, amely a közigazgatási dolgozó elmozdíthatatlanságában nyilvánul meg: az elbocsátással szembeni fokozott jogszabályi védelmet jelenti. A zárt rendszer filozófiája szerint az alkalmazás szolgálat, hivatás, ami élethossziglan (nyugdíjazásig) tart. Az alkalmazottaktól – szemben a munkajogi szabályozással – nem lehet egyoldalúan megválni a munkajogban jogszerűnek elismert indokokra (pl. leépítés) hivatkozással; feladat vagy szerv megszűnésekor a közigazgatás gondoskodik a dolgozó átirányításáról, további foglalkoztatásáról.","hv":"4.1 (4253-4273. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/36","pont":5,"q":"Határozza meg, hogy mit nevezünk asszimilációs rendszernek és differenciált rendszernek, és miben különböznek egymástól!","ks":["asszimilációs rendszer","differenciált rendszer","munkajog","közjogi szabályozás","többletjogosítvány","többletkötelezettség","közhatalom gyakorlása"],"mv":"Az asszimilációs és a differenciált rendszer aszerint különbözik, hogy indokolt-e a közhatalmi munkavégzésre irányuló jogviszony sajátos közjogi szabályozása. Az asszimilációs rendszerben nincs ilyen külön szabályozás: a verseny- és a közszférában dolgozók foglalkoztatása azonos jogi rezsim, a munkajog szabályai alá esik, megkülönböztetés nélkül. A differenciált rendszerben ezzel szemben a közhatalom gyakorlásában részt vevő közigazgatási dolgozót – mivel közhatalmi jogosítványokat alkalmaz – a versenyszféra dolgozóihoz képest többletjogosítványokkal ruházzák fel, amelyek ellentételezéseként többletkötelezettségek terhelik.","hv":"4.1 (4222-4230. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/37","pont":5,"q":"Ismertesse, hogy mit jelent a közigazgatási pálya nyitottsága és mi a jelentősége!","ks":["pálya nyitottsága","jogegyenlőség","származás nem zárhat ki","demokratikus közigazgatás","közhivatalok betöltése","esélyegyenlőség"],"mv":"A közigazgatási pálya nyitottsága azt jelenti, hogy származásra, társadalmi osztályhoz való tartozásra, nemre vagy vagyoni helyzetre hivatkozással senkit nem lehet kizárni a közhivatalok és így a közigazgatási tisztségek betöltésének lehetőségéből. Ez nem jelenti, hogy bárkit alanyi jogon megilletne egy állás betöltése. Jelentősége, hogy megvalósítása nélkül nem beszélhetünk demokratikus közigazgatásról; a feudális jogrendben a jogegyenlőség hiánya nem biztosította a pálya nyitottságát. (Nem keverendő össze a nyílt/zárt rendszerrel.)","hv":"4.2 (4364-4373. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/38","pont":5,"q":"Jellemezze a közigazgatási személyzeti politika 1867 és 1945 közötti korszakát!","ks":["1867-1945","zárt rendszer kialakítása","kiegyezés","korszerű","két világháború között finomítás","karrierrendszer"],"mv":"A közigazgatási személyzeti politika 1867 és 1945 közötti korszakát a zárt rendszer kialakulása és kiteljesedése jellemzi. A zárt rendszerű személyzeti politika a kiegyezés után kezdődött; az első világháború idejére – az egyes elemek különböző jogszabályokban történő szabályozása révén – létrejött a nemzetközi összehasonlításban is korszerűnek mondható zárt rendszer, amelyet a két világháború között tovább finomítottak és modernizáltak (érvényesült a kiválasztás és a tervezhető karrier).","hv":"4.2 (4364-4376. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/39","pont":5,"q":"Jellemezze a közigazgatási személyzeti politika 1945 és 1949 közötti korszakát!","ks":["1945-1949","zsákmányrendszer","képesítési előírások feloldása","többpártrendszer","karrierrendszer megszűnése","államosítás","pártszempontok"],"mv":"A közigazgatási személyzeti politika 1945 és 1949 közötti korszakában a zsákmányrendszer sajátos formája érvényesült. A képesítési előírásokat 1945-ben feloldották, így lehetővé vált az álláshelyek képesítés nélküli betöltése (a szakszerűséget a pártszempontok mögé helyezték). A többpártrendszerben a választások nyomán a politikai pártok saját támogatóikkal töltötték fel a tisztségeket, ezért megszűnt a szakszerűség és a zárt rendszer egyik alappillére, a karrierrendszer (más elemek – illetményrendszer, minősítés, képzés – még megmaradtak). 1948-ban államosították a vármegyei és községi állásokat.","hv":"4.2 (4377-4389. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/40","pont":5,"q":"Jellemezze a közigazgatási személyzeti politika 1949 és 1957 közötti korszakát!","ks":["1949-1957","munka törvénykönyve","speciális jogállás megszűnése","tömeges lecserélés","párthűség","képzettség visszaesése","nyitott rendszer","nincs személyzeti politika"],"mv":"A közigazgatási személyzeti politika 1949 és 1957 közötti korszakában a korábbi rendszer teljes felszámolása volt a cél. Megszűnt a közigazgatási dolgozó speciális jogállása (a munka törvénykönyvét kiterjesztették az államigazgatási dolgozókra), az állományt politikai szempontok szerint tudatosan és tömegesen lecserélték, a feltétel a párthűség volt, előnyt jelentett a munkás-paraszt származás. A képesítési előírások eltörlése a képzettség erős visszaesését, a presztízs romlását és nagy fluktuációt okozott. A személyzeti politika szinte minden elemében a nyitott rendszer érvényesült a zsákmányrendszerrel párosulva – gyakorlatilag nem volt közigazgatási személyzeti politika.","hv":"4.2 (4390-4423. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/41","pont":5,"q":"Jellemezze a közigazgatási személyzeti politika 1957 és 1989 közötti korszakát!","ks":["1957-1989","érdemeken alapuló","képesítési előírások bevezetése","tanácsakadémia","államigazgatási főiskola","politikai megbízhatóság","lassú áttérés"],"mv":"A közigazgatási személyzeti politika 1957 és 1989 közötti korszakában lassan megindult az érdemeken alapuló személyzeti politikára való áttérés, de a megvalósítás vontatott és következetlen volt. A képesítési előírásokat fokozatosan vezették be (előbb a helyi szinten és a beosztottakra, később a központi szerveknél és a vezetőkre); a kiválasztásnál még legalább két évtizedig elsődleges szempont volt a politikai megbízhatóság. Felismerték a képzés szükségességét: középszinten a Tanácsakadémián, 1978-tól pedig az Államigazgatási Főiskolán indult szakemberképzés. Az 1980-as években megkezdődött a zárt rendszerű, egységes törvényi szabályozás tervezése, de elfogadására a rendszerváltás előtt nem került sor.","hv":"4.2 (4424-4447. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/42","pont":5,"q":"Jellemezze a közigazgatási személyzeti politika 1992 utáni korszakát!","ks":["1992 után","köztisztviselők jogállásáról szóló törvény","ktv","zárt rendszer visszaállítása","besorolási osztályok","2006 után nyitott felé","kit","álláshely alapú"],"mv":"A közigazgatási személyzeti politika 1992 utáni korszakát az Országgyűlés által elfogadott, a köztisztviselők jogállásáról szóló 1992. évi XXIII. törvény (Ktv.) nyitotta, amely – egy kivétellel (a kötelező pályáztatás hiánya) – zárt rendszerű személyzeti politikát valósított meg, és a köztisztviselőket iskolai végzettség (besorolási osztályok) és funkció szerint sorolta be. Kezdetben a zárt rendszer finomítása zajlott, 2006 után azonban a szabályozás a nyitott rendszer felé mozdult (új közmenedzsment, teljesítményértékelés, a pálya biztonságának relativizálódása). 2010-től az egységes jogállás megbomlott; 2019-től a Kit. a Kormány irányítása alá tartozó szerveknél kormányzati szolgálati jogviszonyt és álláshely alapú foglalkoztatást vezetett be.","hv":"4.2 (4448-4549. sor)"},{"mod":"Államigazgatás","modName":"Államigazgatás","file":"kerdessor_allamigazgatas_2026.html","qid":"5/43","pont":5,"q":"Sorolja fel az államigazgatási dolgozók felelősségi alakzatait!","ks":["felelősségi alakzatok","fegyelmi felelősség","kárfelelősség","anyagi felelősség","büntetőjogi felelősség","vezetői eredményfelelő
