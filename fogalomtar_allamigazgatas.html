const STORAGE_PREFIX = 'kozig_fogalomtar_ai_v1';
const MARKS_KEY = STORAGE_PREFIX + '_marks';
const POS_KEY = STORAGE_PREFIX + '_pos';
let order = [];
let curIdx = 0;
let flipped = false;
let marks = {};
try { marks = JSON.parse(localStorage.getItem(MARKS_KEY) || '{}'); } catch(e) {}

function esc(s){ const d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; }
function uid(c){ return c.mod+'|'+c.qid; }
function knownCount(){ return Object.values(marks).filter(v=>v==='k').length; }
function unknownCount(){ return Object.values(marks).filter(v=>v==='u').length; }

function applyFilters(){
  const fmod = document.getElementById('fmod').value;
  const fpts = document.getElementById('fpts').value;
  const ffresh = document.getElementById('ffresh').checked;
  return CARDS.filter(c => {
    if (fmod && c.mod !== fmod) return false;
    if (fpts && c.pont !== parseInt(fpts,10)) return false;
    if (ffresh && marks[uid(c)]) return false;
    return true;
  });
}
function buildOrder() {
  const filtered = applyFilters();
  const ord = document.getElementById('forder').value;
  if (ord === 'rand') {
    const a = filtered.slice();
    for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i];a[i]=a[j];a[j]=t; }
    order = a;
  } else if (ord === 'unknown') {
    order = filtered.slice().sort((a,b)=>{
      const am = marks[uid(a)]; const bm = marks[uid(b)];
      const av = am==='u'?0:(am==='k'?2:1); const bv = bm==='u'?0:(bm==='k'?2:1);
      return av - bv;
    });
  } else {
    order = filtered;
  }
}
function renderProgress() {
  const total = order.length;
  document.getElementById('fProgress').innerHTML =
    '<b>' + (total ? (curIdx+1) : 0) + ' / ' + total + '</b> kártya' +
    ' <span class="pill k">✓ Tudtam: ' + knownCount() + '</span>' +
    ' <span class="pill u">❌ Nem tudtam: ' + unknownCount() + '</span>' +
    ' <span class="pill">Jelöletlen: ' + (CARDS.length - knownCount() - unknownCount()) + '</span>';
}
function renderCard() {
  flipped = false;
  document.getElementById('flipBtn').textContent = '👁 Megoldás megmutatása';
  const el = document.getElementById('fcCard');
  if (order.length === 0) {
    el.classList.remove('flipped');
    el.innerHTML = '<div class="empty" style="border:none;background:transparent;padding:40px 10px;"><strong>Nincs a szűrőknek megfelelő kártya.</strong><br><br>Próbáljon meg más szűrőt vagy kapcsolja ki a „csak az újak" opciót.</div>';
    renderProgress();
    return;
  }
  if (curIdx >= order.length) curIdx = 0;
  const c = order[curIdx];
  const ksChips = c.ks.map(k => '<span class="ks-chip">'+esc(k)+'</span>').join('');
  const anch = c.file + '#q-' + c.qid.replace('/','-');
  const m = marks[uid(c)];
  const mIcon = m==='k'?' ✓':(m==='u'?' ❌':'');
  el.classList.remove('flipped');
  el.innerHTML =
    '<div class="meta">' + esc(c.mod) + ' · ' + esc(c.qid) + ' · ' + c.pont + ' pont' + mIcon + '</div>' +
    '<div class="qtxt">' + esc(c.q) + '</div>' +
    '<div class="answer">' +
      '<div class="ks-title">Kulcsfogalmak</div><div class="ks-list">' + ksChips + '</div>' +
      '<div class="ks-title">Tananyag-alapú mintaválasz</div><div class="mv">' + esc(c.mv) + '</div>' +
      '<div class="ref">Tananyag: ' + esc(c.hv) + '</div>' +
      '<a class="reflink" href="' + esc(anch) + '" target="_blank" rel="noopener">Kérdéssorban megnyitás →</a>' +
    '</div>';
  renderProgress();
  localStorage.setItem(POS_KEY, JSON.stringify({idx:curIdx,mod:document.getElementById('fmod').value,pts:document.getElementById('fpts').value,ord:document.getElementById('forder').value,fresh:document.getElementById('ffresh').checked}));
}
function flipCard() {
  const el = document.getElementById('fcCard');
  flipped = !flipped;
  el.classList.toggle('flipped', flipped);
  document.getElementById('flipBtn').textContent = flipped ? '↺ Vissza a kérdéshez' : '👁 Megoldás megmutatása';
}
function nextCard() {
  if (order.length === 0) return;
  curIdx = (curIdx + 1) % order.length; renderCard();
}
function prevCard() {
  if (order.length === 0) return;
  curIdx = (curIdx - 1 + order.length) % order.length; renderCard();
}
function markCard(known) {
  if (order.length === 0) return;
  marks[uid(order[curIdx])] = known ? 'k' : 'u';
  localStorage.setItem(MARKS_KEY, JSON.stringify(marks));
  nextCard();
}
function reshuffle() { curIdx = 0; buildOrder(); renderCard(); }
function resetMarks() {
  if (!confirm('Biztosan törli az összes „Tudtam/Nem tudtam" jelölést?')) return;
  marks = {}; localStorage.removeItem(MARKS_KEY); renderCard();
}

// --- Fogalomtár ---
function buildGlossaryIndex() {
  const idx = {};
  CARDS.forEach(c => {
    c.ks.forEach(kw => {
      const k = kw.trim();
      if (!idx[k]) idx[k] = [];
      idx[k].push({mod:c.mod, qid:c.qid, pont:c.pont, q:c.q, file:c.file});
    });
  });
  return idx;
}
const GLOSS = buildGlossaryIndex();
const GLOSS_KEYS = Object.keys(GLOSS).sort((a,b)=>a.localeCompare(b,'hu',{sensitivity:'base'}));

function firstLetter(s) {
  // Magyar karakterek normalizálása az ABC navigációhoz
  const c = s.trim().charAt(0).toUpperCase();
  const map = {'Á':'A','É':'E','Í':'I','Ó':'O','Ö':'O','Ő':'O','Ú':'U','Ü':'U','Ű':'U'};
  return map[c] || c;
}
function renderGlossary() {
  const q = (document.getElementById('gsearch').value || '').toLowerCase().trim();
  let keys = GLOSS_KEYS;
  if (q) keys = keys.filter(k => k.toLowerCase().includes(q));
  const out = document.getElementById('glosList');
  if (keys.length === 0) {
    out.innerHTML = '<div class="empty">Nincs találat a keresésre.</div>';
    document.getElementById('alphaNav').innerHTML = '';
    return;
  }
  let cur = ''; let html = '';
  const letters = new Set();
  keys.forEach(k => {
    const L = firstLetter(k);
    letters.add(L);
    if (L !== cur) { cur = L; html += '<div class="gletter" id="g-'+L+'">'+L+'</div>'; }
    const occs = GLOSS[k];
    const occHtml = occs.map(o => {
      const snip = o.q.length > 90 ? o.q.substring(0,90)+'…' : o.q;
      const anch = o.file + '#q-' + o.qid.replace('/','-');
      return '<div class="occ"><span class="modtag">'+esc(o.mod)+'</span><a href="'+esc(anch)+'" target="_blank" rel="noopener">'+esc(o.qid)+' · '+o.pont+'p</a> <span class="qsnip">— '+esc(snip)+'</span></div>';
    }).join('');
    html += '<div class="gterm"><div class="term-name">'+esc(k)+' <span style="font-size:12px;color:var(--muted);font-weight:400">('+occs.length+')</span></div>'+occHtml+'</div>';
  });
  out.innerHTML = html;
  // ABC navigátor
  const al = ['A','Á','B','C','D','E','F','G','H','I','J','K','L','M','N','O','Ö','P','Q','R','S','T','U','Ü','V','W','X','Y','Z'];
  document.getElementById('alphaNav').innerHTML = al.filter(L=>letters.has(L)||letters.has(L.replace('Á','A').replace('Ö','O').replace('Ü','U')))
    .map(L => { const target = (L==='Á'?'A':L==='Ö'?'O':L==='Ü'?'U':L); return '<a href="#g-'+target+'">'+L+'</a>'; }).join('');
}
function showMode(m) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === m));
  document.getElementById('flashMode').hidden = (m !== 'flash');
  document.getElementById('glosMode').hidden = (m !== 'glos');
  if (m === 'glos' && !document.getElementById('glosList').innerHTML) renderGlossary();
  localStorage.setItem(STORAGE_PREFIX + '_mode', m);
}

// Init
(function(){
  const savedMode = localStorage.getItem(STORAGE_PREFIX + '_mode') || 'flash';
  ['fmod','fpts','forder'].forEach(id => document.getElementById(id).addEventListener('change', reshuffle));
  document.getElementById('ffresh').addEventListener('change', reshuffle);
  // pozíció és szűrők visszaállítása
  try {
    const p = JSON.parse(localStorage.getItem(POS_KEY) || 'null');
    if (p) {
      document.getElementById('fmod').value = p.mod || '';
      document.getElementById('fpts').value = p.pts || '';
      document.getElementById('forder').value = p.ord || 'seq';
      document.getElementById('ffresh').checked = !!p.fresh;
      buildOrder();
      curIdx = Math.min(p.idx||0, Math.max(0,order.length-1));
    } else { buildOrder(); }
  } catch(e) { buildOrder(); }
  renderCard();
  showMode(savedMode);
  // billentyűk
  document.addEventListener('keydown', function(e){
    if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
    else if (e.key === 'ArrowRight') nextCard();
    else if (e.key === 'ArrowLeft') prevCard();
    else if (e.key === 'k' || e.key === 'K') markCard(true);
    else if (e.key === 'n' || e.key === 'N') markCard(false);
  });
})();
</script></body></html>
